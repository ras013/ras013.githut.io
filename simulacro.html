<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacro Saber 11 - Matemáticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .tab-btn.active { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; font-weight: 700; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white py-12 px-6 shadow-xl mb-10">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl font-extrabold mb-3">Simulacro de matemáticas</h1>
            <p class="text-lg text-blue-100 max-w-2xl mx-auto">20 preguntas tipo saber 11.</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-32">
        <div id="quiz-container" class="space-y-10">
            <!-- Renderizado dinámico -->
        </div>
    </main>

    <!-- Barra de Estado Fija -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-5 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-slate-100 px-4 py-2 rounded-full border border-slate-200">
                    <span class="text-slate-500 font-medium">Progreso:</span>
                    <span id="progress-text" class="font-bold text-slate-800 ml-1">0/20</span>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-xs text-slate-400 uppercase font-bold tracking-widest">Puntaje Estimado</span>
                    <span id="score-text" class="text-3xl font-black text-blue-700">0%</span>
                </div>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-transform active:scale-95 shadow-md">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                comp: "Numérico-Variacional",
                enun: "Un proceso industrial consta de: Planta (15 min), Inspección (5 min). Si no cumple calidad, pasa a Reajuste (20 min) y vuelve a iniciar en Planta. Si un producto falla la inspección UNA vez, pero la segunda vez sí la supera, ¿cuánto tiempo total duró el proceso?",
                opts: ["20 min", "40 min", "55 min", "60 min"],
                correcta: 3,
                sol: "Primer ciclo: Planta(15) + Inspección(5) = 20 min. Falla: Reajuste(20) = 40 min acumulados. Segundo ciclo exitoso: Planta(15) + Inspección(5) = 20 min adicionales. Total: 60 min.",
                veri: "Se debe sumar la secuencia completa: (15+5) + 20 + (15+5) = 60."
            },
            {
                id: 2,
                comp: "Numérico-Variacional",
                enun: "Una mezcla de concreto usa cemento y arena en proporción 2:5. Si se tienen 40 kg de cemento, ¿cuántos kg de arena se necesitan para agotar el cemento manteniendo la mezcla perfecta?",
                opts: ["16 kg", "80 kg", "100 kg", "200 kg"],
                correcta: 2,
                sol: "La razón es 2/5. Planteamos la ecuación: 2 / 5 = 40 / x. Multiplicamos en cruz: 2x = 200, entonces x = 100 kg.",
                veri: "Si dividimos 40/100 obtenemos 0.4, que es igual a 2/5."
            },
            {
                id: 3,
                comp: "Geométrico-Métrico",
                enun: "Un cerramiento rectangular tiene un área de 48 m² y uno de sus lados mide 6 metros. Se desea poner una malla que cuesta $15.000 por metro lineal. ¿Cuál es el costo total de rodear el terreno?",
                opts: ["$210.000", "$420.000", "$360.000", "$280.000"],
                correcta: 1,
                sol: "Si el área es 48 y un lado es 6, el otro lado es 48 / 6 = 8m. El perímetro es 2(6 + 8) = 28m. Costo: 28 * 15.000 = 420.000.",
                veri: "El perímetro es la longitud total de la malla. 28m * $15k = $420k."
            },
            {
                id: 4,
                comp: "Numérico-Variacional",
                enun: "Una empresa de mensajería cobra una base de $5.000 por envío más $1.500 por cada kg de peso. Si un cliente pagó $17.000, ¿cuánto pesaba el paquete?",
                opts: ["11 kg", "10 kg", "8 kg", "7.5 kg"],
                correcta: 2,
                sol: "Modelo: 1500x + 5000 = 17000. Restamos la base: 1500x = 12000. Dividimos: x = 12000 / 1500 = 8 kg.",
                veri: "8 kg * 1500 = 12000. Más 5000 fijos = 17000."
            },
            {
                id: 5,
                comp: "Geométrico-Métrico",
                enun: "Un poste de 12 metros de altura proyecta una sombra de 5 metros en el suelo. ¿Cuál es la distancia mínima entre la punta del poste y el extremo de la sombra?",
                opts: ["17 m", "13 m", "15 m", "12.5 m"],
                correcta: 1,
                sol: "Es un triángulo rectángulo. Aplicamos Pitágoras: 12² + 5² = c². 144 + 25 = 169. Raíz de 169 = 13 metros.",
                veri: "El poste y la sombra son los catetos de un triángulo de dimensiones 5-12-13."
            },
            {
                id: 6,
                comp: "Geométrico-Métrico",
                enun: "Un cilindro metálico tiene un volumen de 100π cm³. Si su altura es de 4 cm, ¿cuál es su radio?",
                opts: ["5 cm", "10 cm", "25 cm", "50 cm"],
                correcta: 0,
                sol: "V = π * r² * h. Entonces 100π = π * r² * 4. Dividimos por π: 100 = 4r². r² = 25, por lo tanto r = 5.",
                veri: "Radio 5 al cuadrado es 25. 25 * 4 = 100. Con π da el volumen original."
            },
            {
                id: 7,
                comp: "Numérico-Variacional",
                enun: "Un cultivo de bacterias se duplica cada 30 minutos. Si a las 8:00 AM hay 500 bacterias, ¿a qué hora habrá 4.000 bacterias?",
                opts: ["9:00 AM", "9:30 AM", "10:00 AM", "10:30 AM"],
                correcta: 1,
                sol: "8:00 (500) -> 8:30 (1000) -> 9:00 (2000) -> 9:30 (4000). Han pasado 3 intervalos de 30 min.",
                veri: "El crecimiento es 500 * 2^n. Para llegar a 4000, n debe ser 3."
            },
            {
                id: 8,
                comp: "Numérico-Variacional",
                enun: "Se requiere un área rectangular de 200 m². Si la base mide x metros y la altura mide (x - 10) metros, ¿cuánto debe medir la base?",
                opts: ["10 m", "20 m", "25 m", "40 m"],
                correcta: 1,
                sol: "x(x - 10) = 200. Ecuación: x² - 10x - 200 = 0. Factorizamos: (x - 20)(x + 10) = 0. El lado debe ser positivo: x = 20.",
                veri: "Base 20m, altura (20-10)=10m. Área = 20 * 10 = 200m²."
            },
            {
                id: 9,
                comp: "Numérico-Variacional",
                enun: "Un artículo de $200.000 tiene un descuento del 10% y luego, sobre ese precio, se aplica un IVA del 19%. ¿Cuál es el precio final?",
                opts: ["$218.000", "$214.200", "$238.000", "$200.000"],
                correcta: 1,
                sol: "Desc. 10%: 200k - 20k = 180k. IVA 19%: 180.000 * 1.19 = 214.200.",
                veri: "El 19% de 180.000 es 34.200. 180.000 + 34.200 = 214.200."
            },
            {
                id: 10,
                comp: "Geométrico-Métrico",
                enun: "Si un triángulo rectángulo isósceles tiene catetos de 10 cm, ¿cuál es el área de un círculo que tenga como radio la hipotenusa de dicho triángulo? (Use π = 3.14)",
                opts: ["628 cm²", "314 cm²", "157 cm²", "100 cm²"],
                correcta: 0,
                sol: "Hipotenusa² = 10² + 10² = 200. Radio² = 200. Área Círculo = π * r² = 3.14 * 200 = 628.",
                veri: "El radio es √200. Al elevarlo al cuadrado para el área, vuelve a ser 200."
            },
            {
                id: 11,
                comp: "Numérico-Variacional",
                enun: "En un mercado, 4 kg de manzanas cuestan lo mismo que 5 kg de peras. Si 1 kg de peras vale $3.200, ¿cuánto valen 2 kg de manzanas?",
                opts: ["$6.400", "$8.000", "$4.000", "$16.000"],
                correcta: 1,
                sol: "5 kg peras = 5 * 3200 = 16.000. Entonces 4 kg manzanas valen 16.000. 1 kg manzanas = 4.000. 2 kg = 8.000.",
                veri: "Relación de intercambio de precios: 4M = 5P."
            },
            {
                id: 12,
                comp: "Geométrico-Métrico",
                enun: "Se tiene un cuadrado de 10 cm de lado. Si se duplican todos sus lados, ¿cuántas veces aumenta su área?",
                opts: ["2 veces", "4 veces", "8 veces", "16 veces"],
                correcta: 1,
                sol: "Área original = 10² = 100. Área nueva = 20² = 400. 400 / 100 = 4 veces.",
                veri: "En geometría, si las dimensiones lineales se multiplican por k, el área se multiplica por k²."
            },
            {
                id: 13,
                comp: "Numérico-Variacional",
                enun: "La suma de las edades de un padre y su hijo es 60 años. Si el padre tiene el triple de la edad del hijo, ¿cuántos años tiene el padre?",
                opts: ["40 años", "45 años", "50 años", "30 años"],
                correcta: 1,
                sol: "P + H = 60 y P = 3H. Sustituyendo: 3H + H = 60 -> 4H = 60 -> H = 15. Por tanto P = 3(15) = 45.",
                veri: "45 (padre) + 15 (hijo) = 60 años."
            },
            {
                id: 14,
                comp: "Geométrico-Métrico",
                enun: "Un tanque de agua rectangular tiene base de 2m x 3m. Si el nivel del agua sube 10 cm, ¿cuántos litros de agua se agregaron? (1m³ = 1000 litros)",
                opts: ["60 litros", "600 litros", "6.000 litros", "6 litros"],
                correcta: 1,
                sol: "Volumen = 2m * 3m * 0.1m = 0.6 m³. En litros: 0.6 * 1000 = 600 litros.",
                veri: "El volumen es el área de la base por el incremento de altura."
            },
            {
                id: 15,
                comp: "Numérico-Variacional",
                enun: "Una progresión aritmética comienza en 5 y su diferencia es 7. ¿Cuál es el valor del término número 11?",
                opts: ["77", "82", "75", "70"],
                correcta: 2,
                sol: "Fórmula: a_n = a_1 + (n-1)d. a_11 = 5 + (10 * 7) = 5 + 70 = 75.",
                veri: "Si sumas 7 diez veces al 5 inicial, llegas a 75."
            },
            {
                id: 16,
                comp: "Geométrico-Métrico",
                enun: "Un triángulo equilátero tiene un perímetro de 18 cm. ¿Cuál es la altura del triángulo?",
                opts: ["6 cm", "3√3 cm", "9 cm", "3 cm"],
                correcta: 1,
                sol: "Lado = 18 / 3 = 6 cm. Altura = (Lado * √3) / 2 = (6√3) / 2 = 3√3.",
                veri: "Usando Pitágoras en medio triángulo: 3² + h² = 6² -> 9 + h² = 36 -> h² = 27 -> h = √27 = 3√3."
            },
            {
                id: 17,
                comp: "Numérico-Variacional",
                enun: "Se lanzan dos dados de 6 caras. ¿Cuál es la probabilidad de que la suma de los resultados sea exactamente 7?",
                opts: ["1/6", "1/12", "1/36", "7/36"],
                correcta: 0,
                sol: "Casos totales: 36. Casos favorables: (1,6), (2,5), (3,4), (4,3), (5,2), (6,1) = 6 casos. Probabilidad = 6/36 = 1/6.",
                veri: "El 7 es el resultado más probable en una suma de dos dados."
            },
            {
                id: 18,
                comp: "Geométrico-Métrico",
                enun: "Un terreno circular tiene un radio de 10m. Se quiere poner una valla en la mitad de la circunferencia. ¿Qué longitud de valla se necesita? (Use π = 3.14)",
                opts: ["62.8 m", "31.4 m", "15.7 m", "100 m"],
                correcta: 1,
                sol: "Circunferencia total = 2 * π * r = 2 * 3.14 * 10 = 62.8 m. Mitad = 31.4 m.",
                veri: "La valla cubre un semicírculo, por eso dividimos por 2."
            },
            {
                id: 19,
                comp: "Numérico-Variacional",
                enun: "Un tanque de 500 litros se llena a una tasa de 20 litros/minuto pero tiene una fuga de 5 litros/minuto. ¿En cuánto tiempo se llenará si está vacío?",
                opts: ["25 min", "33.3 min", "100 min", "20 min"],
                correcta: 1,
                sol: "Tasa neta = 20 - 5 = 15 litros/min. Tiempo = 500 / 15 = 33.33 minutos.",
                veri: "Cada minuto el tanque gana efectivamente 15 litros."
            },
            {
                id: 20,
                comp: "Geométrico-Métrico",
                enun: "Una pirámide de base cuadrada tiene un lado de base de 6 cm y una altura de 10 cm. ¿Cuál es su volumen?",
                opts: ["60 cm³", "120 cm³", "180 cm³", "360 cm³"],
                correcta: 1,
                sol: "Volumen = (Área base * altura) / 3. Área base = 6 * 6 = 36. Volumen = (36 * 10) / 3 = 120 cm³.",
                veri: "Recuerde que el volumen de una pirámide es un tercio del de un prisma con la misma base y altura."
            }
        ];

        let userAnswers = new Array(questions.length).fill(null);

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            if (!container) return;

            container.innerHTML = questions.map((q, idx) => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" id="q-card-${idx}">
                    <div class="px-8 py-5 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold uppercase tracking-wide">${q.comp}</span>
                        <span class="text-sm font-semibold text-slate-400">0${idx + 1} / 20</span>
                    </div>
                    
                    <div class="p-8">
                        <h3 class="text-xl font-semibold leading-relaxed mb-8 text-slate-800">${q.enun}</h3>
                        
                        <div class="flex gap-1 mb-8 bg-slate-100 p-1 rounded-xl w-fit">
                            <button onclick="switchTab(${idx}, 'quiz')" class="tab-btn quiz-btn-${idx} py-2 px-6 rounded-lg text-sm font-bold transition-all active bg-white shadow-sm text-blue-700">Pregunta</button>
                            <button onclick="switchTab(${idx}, 'sol')" class="tab-btn sol-btn-${idx} py-2 px-6 rounded-lg text-sm font-bold transition-all text-slate-500">Explicación</button>
                            <button onclick="switchTab(${idx}, 'veri')" class="tab-btn veri-btn-${idx} py-2 px-6 rounded-lg text-sm font-bold transition-all text-slate-500">Lógica</button>
                        </div>

                        <div id="tab-quiz-${idx}" class="tab-content active space-y-4">
                            ${q.opts.map((opt, oIdx) => `
                                <div onclick="selectAnswer(${idx}, ${oIdx})" 
                                     class="group flex items-center p-4 border-2 rounded-2xl cursor-pointer transition-all ${userAnswers[idx] === oIdx ? 'border-blue-600 bg-blue-50' : 'border-slate-100 hover:border-slate-300 hover:bg-slate-50'}">
                                    <div class="w-10 h-10 flex items-center justify-center rounded-xl border-2 mr-4 transition-all ${userAnswers[idx] === oIdx ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-slate-400 group-hover:border-slate-400'}">
                                        <span class="font-bold">${String.fromCharCode(65 + oIdx)}</span>
                                    </div>
                                    <span class="text-lg ${userAnswers[idx] === oIdx ? 'text-blue-900 font-bold' : 'text-slate-600'}">${opt}</span>
                                    ${userAnswers[idx] === oIdx ? '<i class="fas fa-check-circle ml-auto text-blue-600 text-xl"></i>' : ''}
                                </div>
                            `).join('')}
                        </div>

                        <div id="tab-sol-${idx}" class="tab-content">
                            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                <h4 class="text-indigo-900 font-bold mb-2 flex items-center"><i class="fas fa-calculator mr-2"></i> Resolución paso a paso:</h4>
                                <p class="text-indigo-800 leading-relaxed">${q.sol}</p>
                            </div>
                        </div>

                        <div id="tab-veri-${idx}" class="tab-content">
                            <div class="p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                                <h4 class="text-emerald-900 font-bold mb-2 flex items-center"><i class="fas fa-brain mr-2"></i> Concepto evaluado:</h4>
                                <p class="text-emerald-800 leading-relaxed">${q.veri}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        window.switchTab = (qIdx, tabName) => {
            const card = document.getElementById(`q-card-${qIdx}`);
            if (!card) return;

            card.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            const activeContent = document.getElementById(`tab-${tabName}-${qIdx}`);
            if (activeContent) {
                activeContent.classList.add('active');
            }
            
            card.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-white', 'shadow-sm', 'text-blue-700');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = card.querySelector(`.${tabName}-btn-${qIdx}`);
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-white', 'shadow-sm', 'text-blue-700');
                activeBtn.classList.remove('text-slate-500');
            }
        };

        window.selectAnswer = (qIdx, oIdx) => {
            userAnswers[qIdx] = oIdx;
            renderQuiz();
        };

        function updateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            const correctCount = userAnswers.reduce((acc, curr, idx) => {
                return (curr === questions[idx].correcta) ? acc + 1 : acc;
            }, 0);
            
            const progressEl = document.getElementById('progress-text');
            const scoreEl = document.getElementById('score-text');
            
            if (progressEl) progressEl.innerText = `${answered} / ${questions.length}`;
            if (scoreEl) {
                const percentage = Math.round((correctCount / questions.length) * 100);
                scoreEl.innerText = `${percentage}%`;
            }
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
